name: Kubeflow Pipeline CI

on:
  push:
    branches:
      - main
      - develop

  pull_request:
    branches:
      - main
      - develop

jobs:
  build-and-compile:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Upgrade pip and build tools
        run: |
          python -m pip install --upgrade pip setuptools wheel

      - name: Install Cython
        run: |
          pip install "Cython<3.0.0"

      - name: Install PyYAML
        run: |
          pip install --no-build-isolation PyYAML==5.4.1

      - name: Install Kubeflow Dependencies
        run: |
          pip install \
            kfp==1.8.1 \
            "urllib3<2.0" \
            "requests-toolbelt<1.0.0" \
            google-auth==1.35.0 \
            protobuf==3.20.3 \
            pandas \
            scikit-learn \
            joblib

      - name: Verify Python Environment
        run: |
          python --version
          pip list

      - name: Compile Kubeflow Pipeline
        run: |
          python icecream_pipeline/ml_pipeline.py

      - name: Verify Pipeline YAML Generated
        run: |
          test -f ice_cream_pipeline.yaml

      - name: Upload Pipeline Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ice-cream-pipeline
          path: ice_cream_pipeline.yaml
          
      - name: Verify Docker Installation 
        run: | 
          docker --version 
          docker info

      - name: Build Docker Image
        run: |
          docker build -f icecream_pipeline/Dockerfile -t sklearn:v1 .

      - name: Verify Docker Image 
        run: | 
          docker images






      
